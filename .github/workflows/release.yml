name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install && bun pm trust --all

      - name: Compile native addons from source
        # bun build --compile embeds .node files at the paths listed in require().
        # tree-sitter-rust/c use prebuilds on this platform, so build/Release doesn't
        # exist yet. Compile from source so every explicit require() path resolves.
        run: |
          (cd node_modules/tree-sitter-rust && ../../node_modules/.bin/node-gyp rebuild)
          (cd node_modules/tree-sitter-c && ../../node_modules/.bin/node-gyp rebuild)

      - name: Build linux-x64
        run: bun build --compile --minify-syntax --minify-whitespace ./src/index.ts --outfile ./dist/code-indexer-linux-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-binary
          path: dist/code-indexer-linux-x64

  build-linux-arm64:
    name: Build Linux arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # tree-sitter-rust/c have no linux-arm64 prebuilds, so bun pm trust --all
        # triggers node-gyp rebuild automatically, creating build/Release/.
        run: bun install && bun pm trust --all

      - name: Build linux-arm64
        run: bun build --compile --minify-syntax --minify-whitespace ./src/index.ts --outfile ./dist/code-indexer-linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-binary
          path: dist/code-indexer-linux-arm64

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install && bun pm trust --all

      - name: Compile native addons from source
        # Same as linux-x64: prebuilds exist for darwin so build/Release is missing.
        # Compile from source so bun build --compile can embed the build/Release path.
        run: |
          (cd node_modules/tree-sitter-rust && ../../node_modules/.bin/node-gyp rebuild)
          (cd node_modules/tree-sitter-c && ../../node_modules/.bin/node-gyp rebuild)

      - name: Build darwin-x64
        run: bun build --compile --minify-syntax --minify-whitespace --target=bun-darwin-x64 ./src/index.ts --outfile ./dist/code-indexer-macos-x64

      - name: Build darwin-arm64
        run: bun build --compile --minify-syntax --minify-whitespace --target=bun-darwin-arm64 ./src/index.ts --outfile ./dist/code-indexer-macos-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: dist/code-indexer-macos-*

  release:
    name: Create Release
    needs: [build-linux-x64, build-linux-arm64, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/code-indexer-*
